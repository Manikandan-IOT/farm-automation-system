<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farm Control — Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div style="font-size:2.5rem;margin-bottom:8px">🌾</div>
      <h1>FarmControl</h1>
      <p>Farm Automation System</p>
    </div>

    <div id="alertBox"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-full" id="loginBtn">
        Sign In
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:0.8rem;color:var(--ink-ghost)">
      Contact your administrator to get an account.
    </p>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
  redirectIfLoggedIn();

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in…';
    clearAlert('alertBox');

    try {
      await AuthAPI.login(
        document.getElementById('email').value.trim(),
        document.getElementById('password').value,
      );
      window.location.href = '/dashboard.html';
    } catch (err) {
      showAlert('alertBox', err.message || 'Login failed. Please try again.');
      btn.disabled = false;
      btn.innerHTML = 'Sign In';
    }
  });
</script>
</body>
</html>
