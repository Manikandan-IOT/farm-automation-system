<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fertigation — FarmControl</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="shell">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main">
    <header class="topbar">
      <div class="flex-center gap-12">
        <button class="menu-toggle" id="menuToggle">☰</button>
        <span class="topbar-title" id="topbarTitle">Fertigation Schedules</span>
      </div>
    </header>

    <div class="content">
      <div class="page-header">
        <div>
          <h2>Fertigation Schedules</h2>
          <p>Fertilizer application schedules — sent to device and run offline</p>
        </div>
        <button class="btn btn-primary" onclick="openAdd()">+ New Schedule</button>
      </div>

      <div id="alertBox"></div>

      <div id="scheduleList" class="schedule-list">
        <div class="loading-text">Loading schedules…</div>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="schedModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="schedModalTitle">New Fertigation Schedule</h3>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div id="schedAlert"></div>
      <input type="hidden" id="schedId">

      <div class="form-row">
        <div class="form-group">
          <label for="schedName">Schedule Name *</label>
          <input type="text" id="schedName" placeholder="e.g. NPK Morning Dose">
        </div>
        <div class="form-group">
          <label for="schedValve">Valve *</label>
          <select id="schedValve">
            <option value="">Select valve…</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="schedTime">Start Time *</label>
          <input type="time" id="schedTime">
        </div>
        <div class="form-group">
          <label for="schedDur">Duration (minutes) *</label>
          <input type="number" id="schedDur" min="1" max="999" placeholder="20">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="schedFert">Fertilizer Name *</label>
          <input type="text" id="schedFert" placeholder="e.g. NPK 19-19-19">
        </div>
        <div class="form-group">
          <label for="schedDose">Dose (ml/litre) </label>
          <input type="number" id="schedDose" min="0" step="0.1" placeholder="e.g. 2.5">
        </div>
      </div>

      <div class="form-group">
        <label>Repeat Days *</label>
        <div class="day-selector" id="daySelectorFert"></div>
        <div class="input-hint">Select days this schedule will run each week.</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('schedModal')">Cancel</button>
      <button class="btn btn-primary" id="saveSchedBtn" onclick="saveSched()">Create Schedule</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
  if (!requireAuth()) throw new Error();

  const farmId = getFarmIdFromUrl();
  if (!farmId) { window.location.href = '/farms.html'; throw new Error(); }

  async function init() {
    buildSidebar('fertigation');
    initMobileMenu();
    initModalClose();

    try {
      const { farm } = await FarmsAPI.get(farmId);
      document.getElementById('topbarTitle').textContent = `${farm.name} — Fertigation`;
    } catch (e) {}

    await Promise.all([loadValves(), loadSchedules()]);
  }

  async function loadValves() {
    try {
      const { valves } = await ValvesAPI.list(farmId);
      const sel = document.getElementById('schedValve');
      sel.innerHTML = '<option value="">Select valve…</option>';
      valves.forEach(v => {
        sel.innerHTML += `<option value="${v.id}">${escHtml(v.name)}${v.motor_name ? ' (' + escHtml(v.motor_name) + ')' : ''}</option>`;
      });
    } catch (e) {}
  }

  async function loadSchedules() {
    try {
      const { schedules } = await FertigationAPI.list(farmId);
      const container = document.getElementById('scheduleList');
      const active = schedules.filter(s => s.status !== 'deleted');

      if (!active.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🧪</div>
            <h4>No fertigation schedules yet</h4>
            <p>Create a schedule to automate fertilizer application.</p>
          </div>`;
        return;
      }

      const allDays = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      container.innerHTML = active.map(s => `
        <div class="schedule-card" style="border-left:3px solid var(--amber)">
          <div class="schedule-time" style="color:var(--amber)">${formatTime(s.start_time)}</div>
          <div class="schedule-info">
            <div class="schedule-name">${escHtml(s.name)}</div>
            <div class="schedule-meta">
              ${escHtml(s.valve_name || '—')}
              ${s.motor_name ? ` · ${escHtml(s.motor_name)}` : ''}
              · ${s.duration_min} min
              · <span style="color:var(--amber);font-weight:600">🧪 ${escHtml(s.fertilizer)}</span>
              ${s.dose_ml ? ` @ ${s.dose_ml} ml/L` : ''}
              <span class="badge ${s.status === 'active' ? 'badge-green' : 'badge-gray'}" style="margin-left:6px">${s.status}</span>
            </div>
            <div class="schedule-days">
              ${allDays.map(d => `<span class="day-pill ${s.days.includes(d) ? '' : 'inactive'}" style="${s.days.includes(d) ? 'background:var(--amber-pale);color:#b5622a' : ''}">${d}</span>`).join('')}
            </div>
          </div>
          <div class="flex gap-8" style="flex-shrink:0">
            ${s.status === 'active'
              ? `<button class="btn btn-secondary btn-sm" onclick="pauseSchedule(${s.id})">⏸ Pause</button>`
              : `<button class="btn btn-ghost btn-sm" onclick="resumeSchedule(${s.id})">▶ Resume</button>`}
            <button class="btn btn-secondary btn-sm" onclick="openEdit(${s.id})">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteSchedule(${s.id})">✕</button>
          </div>
        </div>
      `).join('');
    } catch (e) {
      showAlert('alertBox', e.message);
    }
  }

  function openAdd() {
    document.getElementById('schedId').value = '';
    ['schedName','schedValve','schedTime','schedFert','schedDose'].forEach(id => {
      const el = document.getElementById(id); if (el) el.value = '';
    });
    document.getElementById('schedDur').value = '';
    document.getElementById('schedModalTitle').textContent = 'New Fertigation Schedule';
    document.getElementById('saveSchedBtn').textContent = 'Create Schedule';
    clearAlert('schedAlert');
    initDaySelector('daySelectorFert', []);
    openModal('schedModal');
  }

  async function openEdit(id) {
    try {
      const { schedules } = await FertigationAPI.list(farmId);
      const s = schedules.find(x => x.id === id);
      if (!s) return;
      document.getElementById('schedId').value   = id;
      document.getElementById('schedName').value = s.name;
      document.getElementById('schedValve').value= s.valve_id;
      document.getElementById('schedTime').value = s.start_time;
      document.getElementById('schedDur').value  = s.duration_min;
      document.getElementById('schedFert').value = s.fertilizer;
      document.getElementById('schedDose').value = s.dose_ml || '';
      document.getElementById('schedModalTitle').textContent = 'Edit Fertigation Schedule';
      document.getElementById('saveSchedBtn').textContent = 'Save Changes';
      clearAlert('schedAlert');
      initDaySelector('daySelectorFert', s.days);
      openModal('schedModal');
    } catch (e) { showAlert('alertBox', e.message); }
  }

  async function saveSched() {
    const id = document.getElementById('schedId').value;
    const days = getSelectedDays('daySelectorFert');
    const dose = parseFloat(document.getElementById('schedDose').value);
    const body = {
      name:         document.getElementById('schedName').value.trim(),
      valve_id:     parseInt(document.getElementById('schedValve').value),
      start_time:   document.getElementById('schedTime').value,
      duration_min: parseInt(document.getElementById('schedDur').value),
      fertilizer:   document.getElementById('schedFert').value.trim(),
      dose_ml:      isNaN(dose) ? null : dose,
      days,
    };

    if (!body.name)       return showAlert('schedAlert', 'Schedule name required');
    if (!body.valve_id)   return showAlert('schedAlert', 'Select a valve');
    if (!body.start_time) return showAlert('schedAlert', 'Start time required');
    if (!body.duration_min || body.duration_min < 1) return showAlert('schedAlert', 'Duration must be at least 1 minute');
    if (!body.fertilizer) return showAlert('schedAlert', 'Fertilizer name required');
    if (!days.length)     return showAlert('schedAlert', 'Select at least one day');

    const btn = document.getElementById('saveSchedBtn');
    btn.disabled = true;
    try {
      if (id) await FertigationAPI.update(farmId, id, body);
      else    await FertigationAPI.create(farmId, body);
      closeModal('schedModal');
      showAlert('alertBox', 'Fertigation schedule saved and sent to device', 'success');
      await loadSchedules();
    } catch (e) {
      showAlert('schedAlert', e.message);
    } finally {
      btn.disabled = false;
    }
  }

  async function pauseSchedule(id) {
    try { await FertigationAPI.update(farmId, id, { status: 'paused' }); await loadSchedules(); }
    catch (e) { showAlert('alertBox', e.message); }
  }

  async function resumeSchedule(id) {
    try { await FertigationAPI.update(farmId, id, { status: 'active' }); await loadSchedules(); }
    catch (e) { showAlert('alertBox', e.message); }
  }

  async function deleteSchedule(id) {
    if (!confirm('Delete this schedule?')) return;
    try {
      await FertigationAPI.delete(farmId, id);
      showAlert('alertBox', 'Schedule deleted', 'success');
      await loadSchedules();
    } catch (e) { showAlert('alertBox', e.message); }
  }

  init();
</script>
</body>
</html>
