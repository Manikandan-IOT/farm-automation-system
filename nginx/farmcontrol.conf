# /etc/nginx/sites-available/farmcontrol
# Copy this file to /etc/nginx/sites-available/farmcontrol
# Then: sudo ln -s /etc/nginx/sites-available/farmcontrol /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN.duckdns.org;
    return 301 https://$host$request_uri;
}

# ─── Main HTTPS server ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name YOUR_DOMAIN.duckdns.org;

    # SSL - Let's Encrypt certificates
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.duckdns.org/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection      "1; mode=block";

    # ── API proxy → Node.js backend ──────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Static frontend files ─────────────────────────────────────────────────
    location / {
        root   /var/www/farmcontrol/frontend;
        index  index.html;
        try_files $uri $uri.html $uri/ /index.html;

        # Cache static assets
        location ~* \.(css|js|png|jpg|ico|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── MQTT over WebSocket (WSS) ─────────────────────────────────────────────
    # Mosquitto handles this directly on port 9001 with TLS
    # No nginx proxy needed for MQTT WSS - browsers connect to port 9001 directly
    # Make sure port 9001 is open in Oracle firewall
}

